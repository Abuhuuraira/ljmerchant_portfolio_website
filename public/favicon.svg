<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .bg { fill: #1a1a1a; }
      .accent { fill: #00d4ff; }
      .secondary { fill: #00a8cc; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="100" height="100" rx="20"/>
  
  <!-- Outer circle ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  
  <!-- Medical pulse/heartbeat line forming 'LJ' -->
  <g class="accent">
    <!-- L shape -->
    <line x1="30" y1="35" x2="30" y2="65" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="65" x2="42" y2="65" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
    
    <!-- J shape -->
    <line x1="60" y1="35" x2="60" y2="60" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="60" cy="68" r="4" class="accent"/>
  </g>
  
  <!-- Center dot accent -->
  <circle cx="50" cy="78" r="3" class="secondary" opacity="0.8"/>
  
  <!-- Corner accent dots (futuristic touch) -->
  <circle cx="20" cy="20" r="2" class="secondary" opacity="0.5"/>
  <circle cx="80" cy="20" r="2" class="secondary" opacity="0.5"/>
  <circle cx="20" cy="80" r="2" class="secondary" opacity="0.5"/>
  <circle cx="80" cy="80" r="2" class="secondary" opacity="0.5"/>
</svg>